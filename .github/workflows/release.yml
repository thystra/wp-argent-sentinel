name: Build plugin release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PLUGIN_SLUG: argent-sentinel-wordpress

jobs:
  test:
    name: Test on PHP ${{ matrix.php }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.4'
          - '8.5'

    steps:
      - name: Check out tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: Run dependency-free tests
        run: |
          php -d error_reporting=E_ALL -d display_errors=1 tests/run.php
          php -d error_reporting=E_ALL -d display_errors=1 tests/export-run.php
      - name: Check PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.php' -not -path './build/*' -print0 |
            xargs -0 -n 1 php -l

  package:
    name: Build installable ZIP
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      artifact-name: ${{ steps.package.outputs.artifact-name }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must use v<major>.<minor>.<patch> syntax." >&2
            exit 1
          fi

          version="${BASH_REMATCH[1]}"
          mapfile -t plugin_versions < <(
            sed -nE \
              's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*([^[:space:]]+).*$/\1/p' \
              argent-sentinel-wordpress.php
          )
          mapfile -t readme_versions < <(
            sed -nE 's/^Stable tag:[[:space:]]*([^[:space:]]+).*$/\1/p' readme.txt
          )
          mapfile -t runtime_versions < <(
            sed -nE \
              "s/^[[:space:]]*public const VERSION[[:space:]]*=[[:space:]]*'([^']+)';/\1/p" \
              src/Plugin.php
          )

          if (
            ((${#plugin_versions[@]} != 1)) ||
            ((${#readme_versions[@]} != 1)) ||
            ((${#runtime_versions[@]} != 1))
          ); then
            echo "Expected exactly one version declaration in each release metadata file." >&2
            exit 1
          fi

          if (
            [[ "${version}" != "${plugin_versions[0]}" ]] ||
            [[ "${version}" != "${readme_versions[0]}" ]] ||
            [[ "${version}" != "${runtime_versions[0]}" ]]
          ); then
            echo "Tag and all plugin version declarations must match." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build and verify plugin archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          archive_name="${PLUGIN_SLUG}-${version}.zip"
          archive="build/${archive_name}"

          mkdir -p build
          git archive \
            --format=zip \
            --prefix="${PLUGIN_SLUG}/" \
            --output="${archive}" \
            HEAD

          unzip -tq "${archive}"
          unzip -Z1 "${archive}" |
            grep -qx "${PLUGIN_SLUG}/argent-sentinel-wordpress.php"

          if unzip -Z1 "${archive}" |
            grep -Eq "^${PLUGIN_SLUG}/(\.github/|build/|tests/|vendor/|composer\.json$|phpcs\.xml\.dist$)"; then
            echo "Development-only files leaked into ${archive}." >&2
            exit 1
          fi

          (
            cd build
            sha256sum "${archive_name}" > "${archive_name}.sha256"
          )

          echo "artifact-name=${PLUGIN_SLUG}-${version}" >> "${GITHUB_OUTPUT}"

      - name: Retain verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact-name }}
          path: build/
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.package.outputs.tag }}
      RELEASE_VERSION: ${{ needs.package.outputs.version }}

    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: release-assets

      - name: Verify downloaded checksum
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum --check "${PLUGIN_SLUG}-${RELEASE_VERSION}.zip.sha256"

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail

          archive="release-assets/${PLUGIN_SLUG}-${RELEASE_VERSION}.zip"
          checksum="${archive}.sha256"
          title="Argent Sentinel WordPress Connector ${RELEASE_TAG}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; refusing to replace published assets." >&2
            exit 1
          fi

          gh release create \
            "${RELEASE_TAG}" \
            "${archive}" \
            "${checksum}" \
            --verify-tag \
            --title "${title}" \
            --generate-notes
